<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangosWiki</title>
    <style>
        /* Body and HTML for full page background */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            /* Your requested background style */
            background: linear-gradient(180deg, #4b0082 0%, #000000 100%);
            background-attachment: fixed;
            display: flex; flex-direction: column;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
        }

        /* Top Header Tab */
        header {
            height: 40px;
            width: 100%;
            background-color: #1a1a1b; /* Slightly lighter dark for the tab bar */
            border-bottom: 2px solid black; /* Black border on the right as per sketch */
            display: flex;
            align-items: center;
            padding-left: 12px;
            color: #d7dadc;
            font-size: 13px;
            box-sizing: border-box;
        }

        /* The vertical "bar" from your sketch */
        header span.vertical-bar {
            width: 2px;
            height: 100%;
            background-color: black;
            margin-left: 10px;
            margin-right: 10px;
        }

        header img {
            height: 18px;
            width: 18px;
            border-radius: 3px;
        }

        /* Games List Container */
        #games-container {
            padding: 40px;
            display: flex;
            flex-wrap: wrap; /* Allows wrapping to new lines */
            gap: 25px; /* Space between the cards */
        }

        /* Game Card Style to match your sketch */
        .game-card {
            width: 140px; /* Example width from sketch */
            height: 140px; /* Example height from sketch */
            border: 2px solid black; /* Black border as in sketch */
            background-color: #1a1a1b; /* Card background */
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s; /* Add a hover effect */
        }

        /* Hover effect to make it feel responsive */
        .game-card:hover {
            transform: scale(1.05);
        }

        .game-icon-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://brankonice1.github.io/favicon.ico" alt="icon">
        <span class="vertical-bar"></span> <span>MangosWiki</span>
    </header>

    <div id="games-container">
        
        <a href="https://brankonice1.github.io/games/flash/papapizzeria/#" target="_blank" class="game-card">
            <div class="game-icon-wrapper">
                <img src="https://raw.githubusercontent.com/BrankoNice1/brankonice1.github.io/main/icons/Untitled.jpg" alt="Papa's Pizzeria">
            </div>
        </a>

        </div>

</body>
</html>
