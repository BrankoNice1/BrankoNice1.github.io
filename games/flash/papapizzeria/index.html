<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | MangosWiki</title>
    <style>
        /* Base styles for your page */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #container {
            width: 800px;
            height: 600px;
            position: relative;
        }

        /* This ensures the Ruffle player fills the container */
        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": true,
            /* Forces the background of the loading screen to the fade */
            "backgroundColor": "#4b0082", 
        };

        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("container");
            container.appendChild(player);

            // Load the game
            player.load("https://brankonice1.github.io/games/flash/papapizzeria.swf");

            /* CRITICAL FIX: We inject a <style> tag directly into the 
               player's Shadow DOM once it's ready.
            */
            player.addEventListener("loadedmetadata", () => {
                const style = document.createElement('style');
                style.textContent = `
                    #overlay {
                        background: linear-gradient(180deg, #4b0082 0%, #000000 100%) !important;
                    }
                    #message {
                        visibility: hidden !important;
                    }
                    #message::after {
                        content: "the game is loading wait.";
                        visibility: visible;
                        position: absolute;
                        top: 0; left: 0; width: 100%;
                        text-align: center;
                        color: white;
                        font-family: sans-serif;
                        font-size: 20px;
                    }
                    #message::before {
                        content: "powered by ruffle";
                        visibility: visible;
                        position: absolute;
                        top: 40px; left: 0; width: 100%;
                        text-align: center;
                        color: rgba(255,255,255,0.5);
                        font-size: 12px;
                    }
                `;
                // Accessing the shadowRoot to apply styles inside Ruffle
                if (player.shadowRoot) {
                    player.shadowRoot.appendChild(style);
                }
            });
        });
    </script>
</body>
</html>
