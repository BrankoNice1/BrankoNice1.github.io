<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | MangosWiki</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(75, 0, 130, 0.5);
        }

        #custom-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #4b0082 0%, #1a0033 50%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99;
            transition: opacity 0.8s ease;
        }

        #status-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.9);
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }

        .loading-animation {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="custom-loader">
            <div id="status-text">CLICK TO PLAY</div>
            <div class="sub-text">powered by ruffle</div>
        </div>
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": false, 
            "autoplay": "on",
            "unmuteOverlay": "hidden",
            "allowScriptAccess": true,
            /* This helps Ruffle ignore some external data blocks that cause CORS hangs */
            "parameters": "", 
        };

        const loader = document.getElementById("custom-loader");
        const statusText = document.getElementById("status-text");
        const wrapper = document.getElementById("game-wrapper");

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("container").appendChild(player);

        // Path to the game
        player.load("https://brankonice1.github.io/games/flash/papapizzeria/papapizzeria.swf");

        wrapper.addEventListener("click", function() {
            // Check if game is actually loaded into Ruffle yet
            statusText.innerText = "the game is loading wait.";
            statusText.classList.add("loading-animation");
            
            // Activate Audio Context
            player.play();

            // Wait for the game to be ready to display
            const checkLoad = setInterval(() => {
                // If metadata exists, the SWF has at least parsed the header
                if (player.metadata) { 
                    clearInterval(checkLoad);
                    // Short delay to ensure the first frame is ready
                    setTimeout(fadeOutLoader, 1500);
                }
            }, 100);
        });

        function fadeOutLoader() {
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
            }, 800);
        }
    </script>
</body>
</html>
