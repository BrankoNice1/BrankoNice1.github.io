<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | MangosWiki</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
        }

        /* THE "CAPCUT" LAYER (Custom Loading Screen) */
        #custom-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Cool Purple to Black Fade */
            background: linear-gradient(180deg, #4b0082 0%, #1a0033 50%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99; /* Sits on top of everything */
            transition: opacity 0.5s ease;
            pointer-events: none; /* Let clicks pass through if needed */
        }

        .loading-text {
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
        }

        .powered-by {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            text-transform: lowercase;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="custom-loader">
            <div class="loading-text">the game is loading wait.</div>
            <div class="powered-by">powered by ruffle</div>
        </div>
        
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": false, // Disable Ruffle's built-in splash to avoid double loading
        };

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        const container = document.getElementById("container");
        container.appendChild(player);

        // Load the game
        player.load("https://brankonice1.github.io/games/flash/papapizzeria/papapizzeria.swf");

        // FADE OUT THE LAYER
        // We wait for the game to actually start (onLoaded event)
        player.addEventListener("loadedmetadata", () => {
            // Give it 1 extra second to make sure it's smooth
            setTimeout(() => {
                const loader = document.getElementById("custom-loader");
                loader.style.opacity = "0";
                // Remove it from view entirely after fade
                setTimeout(() => loader.style.display = "none", 500);
            }, 1000);
        });
    </script>
</body>
</html>
