<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | BrankoNice1</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: sans-serif;
        }
        #container { width: 800px; height: 600px; }
        ruffle-player { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": true,
            "backgroundColor": "#4b0082"
        };

        const container = document.getElementById("container");
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        container.appendChild(player);

        // Targeted the specific SWF inside your directory
        player.load("https://brankonice1.github.io/games/flash/papapizzeria/papapizzeria.swf");

        // STYLING INJECTION
        // This targets the Ruffle Shadow DOM directly to force the purple fade and text
        const injectStyles = () => {
            if (player.shadowRoot) {
                const styleExists = player.shadowRoot.querySelector("#custom-css");
                if (!styleExists) {
                    const sheet = document.createElement("style");
                    sheet.id = "custom-css";
                    sheet.textContent = `
                        #overlay {
                            background: linear-gradient(180deg, #4b0082 0%, #000000 100%) !important;
                        }
                        #message {
                            visibility: hidden !important;
                        }
                        #message::after {
                            content: "the game is loading wait.";
                            visibility: visible;
                            position: absolute;
                            top: 0; left: 0; width: 100%;
                            text-align: center;
                            color: white;
                            font-size: 20px;
                        }
                        #message::before {
                            content: "powered by ruffle";
                            visibility: visible;
                            position: absolute;
                            top: 40px; left: 0; width: 100%;
                            text-align: center;
                            color: rgba(255,255,255,0.5);
                            font-size: 12px;
                            text-transform: lowercase;
                        }
                    `;
                    player.shadowRoot.appendChild(sheet);
                }
            }
        };

        // Use an observer to catch the loading screen as soon as it appears
        const observer = new MutationObserver(injectStyles);
        observer.observe(player, { childList: true, subtree: true });
        
        // Initial call
        injectStyles();
    </script>
</body>
</html>
