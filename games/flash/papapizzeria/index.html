<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | MangosWiki</title>
    <link rel="icon" type="image/x-icon" href="https://brankonice1.github.io/favicon.ico">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Top Header Tab */
        header {
            height: 40px;
            width: 100%;
            background-color: #1a1a1b; /* Slightly lighter dark for the tab bar */
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding-left: 12px;
            color: #d7dadc;
            font-size: 13px;
        }

        header img {
            height: 18px;
            width: 18px;
            margin-right: 10px;
            border-radius: 3px;
        }

        #game-wrapper {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        /* Fixed Flash size: 800x600 */
        #container {
            width: 800px;
            height: 600px;
            background: #000;
            position: relative;
        }

        /* CUSTOM LOADING LAYER (Purple and Black Fade) */
        #custom-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #4b0082 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #status-text {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-top: 12px;
            text-transform: lowercase;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }

        .pulse {
            animation: pulse-animation 1.5s infinite ease-in-out;
        }

        @keyframes pulse-animation {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://brankonice1.github.io/favicon.ico" alt="icon">
        <span>MangosWiki</span>
    </header>

    <div id="game-wrapper">
        <div id="custom-loader" onclick="initGame()">
            <div id="status-text">CLICK TO PLAY</div>
            <div class="sub-text">powered by ruffle</div>
        </div>
        
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": false,
            "autoplay": "on",
            "unmuteOverlay": "hidden"
        };

        const loader = document.getElementById("custom-loader");
        const statusText = document.getElementById("status-text");
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("container").appendChild(player);

        // Loading the SWF
        player.load("https://brankonice1.github.io/games/flash/papapizzeria/papapizzeria.swf");

        function initGame() {
            // Update text to your specific loading phrase
            statusText.innerText = "the game is loading wait.";
            statusText.classList.add("pulse");

            // Resume audio context for Firefox/Chrome
            player.play();

            // Check if game is ready
            const checkReady = setInterval(() => {
                if (player.metadata) {
                    clearInterval(checkReady);
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        setTimeout(() => loader.style.display = "none", 800);
                    }, 1200);
                }
            }, 200);
        }
    </script>
</body>
</html>
