<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | MangosWiki</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
            cursor: pointer;
        }

        /* CUSTOM PURPLE FADE LAYER */
        #custom-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #4b0082 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease, visibility 1s;
        }

        #status-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.8);
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-top: 15px;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper" onclick="handleStart()">
        <div id="custom-loader">
            <div id="status-text">CLICK TO PLAY</div>
            <div class="sub-text">powered by ruffle</div>
        </div>
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": false, // Keep false to hide the blue Ruffle screen
            "autoplay": "on",
            "unmuteOverlay": "hidden"
        };

        const loader = document.getElementById("custom-loader");
        const statusText = document.getElementById("status-text");
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("container").appendChild(player);

        // Start loading the SWF immediately
        player.load("https://brankonice1.github.io/games/flash/papapizzeria/papapizzeria.swf");

        function handleStart() {
            // Update text immediately on click
            statusText.innerText = "the game is loading wait.";
            statusText.classList.add("pulse");
            
            // Resume AudioContext
            player.play();

            // Check if the game is ready
            const checkLoad = setInterval(() => {
                // Once metadata is loaded, the game engine is active
                if (player.metadata) {
                    clearInterval(checkLoad);
                    // Slight delay to ensure the first frame of the game renders
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        loader.style.visibility = "hidden";
                    }, 1000);
                }
            }, 200);
        }
    </script>
</body>
</html>
