<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | MangosWiki</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000;
        }

        /* THE CLICKABLE TOP LAYER */
        #custom-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Purple to Black Fade */
            background: linear-gradient(180deg, #4b0082 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer; /* Makes it obvious you can click */
            transition: opacity 1s ease;
        }

        #status-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            pointer-events: none; /* Clicks go through text to the loader div */
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-top: 15px;
            pointer-events: none;
        }

        #container {
            width: 100%;
            height: 100%;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="custom-loader" onclick="startEverything()">
            <div id="status-text">CLICK TO PLAY</div>
            <div class="sub-text">powered by ruffle</div>
        </div>
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": false,
            "autoplay": "on",
            "unmuteOverlay": "hidden"
        };

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        const container = document.getElementById("container");
        container.appendChild(player);

        // Load the SWF immediately so it's ready in the background
        player.load("https://brankonice1.github.io/games/flash/papapizzeria/papapizzeria.swf");

        function startEverything() {
            const loader = document.getElementById("custom-loader");
            const statusText = document.getElementById("status-text");

            // 1. Swap Text Immediately
            statusText.innerText = "the game is loading wait.";
            statusText.classList.add("pulse");

            // 2. FORCE AUDIO RESUME (The "User Gesture" fix)
            // This manually pings the Ruffle audio context
            if (player.play) {
                player.play();
            }

            // 3. Monitor for Load Completion
            const checkLoad = setInterval(() => {
                // If Ruffle has metadata, the game is initialized
                if (player.metadata) {
                    clearInterval(checkLoad);
                    
                    // Final fade out
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        setTimeout(() => {
                            loader.style.display = "none";
                        }, 1000);
                    }, 500);
                }
            }, 200);
        }
    </script>
</body>
</html>
