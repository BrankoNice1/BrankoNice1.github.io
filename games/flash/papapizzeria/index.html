<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa's Pizzeria | MangosWiki</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; /* Deep black background */
            display: flex; flex-direction: column;
            overflow: hidden; font-family: sans-serif;
        }

        /* Top Tab/Header bar like your screenshot */
        header {
            height: 40px;
            width: 100%;
            background-color: #000;
            border-bottom: 2px solid #333; /* The black line separator */
            display: flex;
            align-items: center;
            padding-left: 15px;
            color: #fff;
            font-size: 14px;
        }

        header img {
            height: 16px;
            margin-right: 10px;
        }

        #game-wrapper {
            position: relative;
            flex-grow: 1; /* Fills remaining space below header */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #container {
            width: 800px;
            height: 600px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.2);
        }

        /* THE LOADING LAYER - Black to Blue Fade */
        #custom-loader {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Black to Blue linear gradient */
            background: linear-gradient(180deg, #000000 0%, #001a33 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        #status-text {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 153, 255, 0.8);
        }

        .sub-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <img src="favicon.ico" alt="icon">
        <span>mantos wiki</span>
    </header>

    <div id="game-wrapper">
        <div id="custom-loader" onclick="startApp()">
            <div id="status-text">CLICK TO PLAY</div>
            <div class="sub-text">powered by ruffle</div>
        </div>
        
        <div id="container"></div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "letterbox": "on",
            "splashScreen": false,
            "autoplay": "on",
            "unmuteOverlay": "hidden"
        };

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("container").appendChild(player);

        player.load("https://brankonice1.github.io/games/flash/papapizzeria/papapizzeria.swf");

        function startApp() {
            const loader = document.getElementById("custom-loader");
            const statusText = document.getElementById("status-text");

            // Change text to your required phrase
            statusText.innerText = "the game is loading wait.";
            statusText.classList.add("pulse");

            // Activate sound engine
            player.play();

            // Wait for game engine ready
            const checkLoad = setInterval(() => {
                if (player.metadata) {
                    clearInterval(checkLoad);
                    setTimeout(() => {
                        loader.style.opacity = "0";
                        setTimeout(() => loader.style.display = "none", 1000);
                    }, 1000);
                }
            }, 200);
        }
    </script>
</body>
</html>
