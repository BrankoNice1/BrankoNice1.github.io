<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Welcome Screen</title>
    <style>
        /* Minecraft Font (simulated) */
        @font-face {
            font-family: 'MinecraftRegular';
            src: url('https://fonts.cdnfonts.com/s/17260/Minecraft.woff') format('woff');
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'MinecraftRegular', sans-serif; /* Applied everywhere */
            background-color: white; /* Start light to match the sketch */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* Center items vertically and horizontally */
            overflow: hidden;
        }

        /* Initial Question (Input Screen) */
        #input-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 1;
            transition: opacity 1s ease, transform 1s ease;
        }

        /* Styling the header text like the image */
        #whats-your-name-text {
            font-size: 2.5rem;
            color: #121212;
            text-transform: capitalize; /* "Whats Your Name?" */
            margin-bottom: 2rem;
            -webkit-text-stroke: 1.5px black; /* Outline for visibility */
            letter-spacing: 0.05rem;
        }

        /* The stylized input group matching the sketch */
        #styled-input-group {
            position: relative;
            width: 320px; /* Slightly wider */
            height: 60px;
        }

        /* The handwritten input box */
        input[type="text"] {
            width: 100%;
            height: 100%;
            border: 3px solid black; /* Heavy black line */
            border-radius: 8px; /* Slightly rounded, like the sketch */
            padding-left: 15px;
            padding-right: 70px; /* Make space for the button inside */
            font-size: 1.5rem;
            box-sizing: border-box; /* Crucial for padding/width math */
            font-family: 'MinecraftRegular', sans-serif;
            background-color: #fafafa;
        }

        /* Focus state for input */
        input[type="text"]:focus {
            outline: none;
            border-color: #333;
        }

        /* The green submit button matching the sketch */
        #styled-submit {
            position: absolute;
            top: 3px; /* Align with border weight */
            right: 3px;
            width: 60px; /* Square button */
            height: calc(100% - 6px); /* Align inside */
            border: 3px solid black;
            border-radius: 8px; /* Matching corner radius */
            background-color: #00e600; /* Bright green */
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        #styled-submit:hover {
            background-color: #33ff33;
        }

        /* The arrow inside the button */
        #styled-submit-arrow {
            font-size: 2.5rem;
            color: black;
            font-weight: bold;
            display: inline-block;
            transform: translateY(2px); /* Vertical adjustment */
        }

        /* Final UI: Welcome Screen (Hidden by default) */
        #welcome-screen {
            display: none;
            text-align: center;
            opacity: 0;
            transform: translateY(40px); /* Starts below */
            transition: opacity 2s ease, transform 2.5s cubic-bezier(0.4, 0.0, 0.2, 1); /* Slower, smoother ease */
        }

        /* Welcome Text */
        #welcome-text {
            font-size: 3rem;
            color: #333;
            margin-bottom: 1rem;
            -webkit-text-stroke: 1.5px black;
            text-transform: capitalize;
            letter-spacing: 0.1rem;
        }

<body>

    <div id="input-container">
        <div id="whats-your-name-text">Whats Your Name?</div>
        
        <div id="styled-input-group">
            <input type="text" id="userName" maxlength="15" onkeydown="if(event.key === 'Enter') startTransition()">
            <div id="styled-submit" onclick="startTransition()">
                <div id="styled-submit-arrow">→</div>
            </div>
        </div>
    </div>

    <div id="welcome-screen">
        <h1 id="welcome-text"></h1>
        <div id="loading-gif"></div>
    </div>

    <script>
        function startTransition() {
            const nameInput = document.getElementById('userName');
            const name = nameInput.value.trim();
            if (!name) {
                // Shake the input group if empty (a little polish)
                const group = document.getElementById('styled-input-group');
                group.style.animation = 'shake 0.3s ease';
                setTimeout(() => group.style.animation = '', 300);
                return;
            }

            const inputContainer = document.getElementById('input-container');
            const welcomeScreen = document.getElementById('welcome-screen');
            const welcomeText = document.getElementById('welcome-text');
            const body = document.body;

            // 1. Fade out the original interface quickly
            inputContainer.style.opacity = '0';
            inputContainer.style.transform = 'translateY(-10px)'; // subtle upward drift

            // 2. Begin the screen fade to white flash (fast)
            body.classList.add('white-flash');

            // 3. Set up the welcome screen text
            welcomeText.innerHTML = `It's Good To See You, <span style="color: #0088ff">${name}</span>`;

            // 4. Time the transition events
            // Wait for fade-out/flash to complete
            setTimeout(() => {
                inputContainer.style.display = 'none'; // remove input from layout
                welcomeScreen.style.display = 'block'; // show welcome container

                // 5. Fade in the new content from below (slower, dynamic feel)
                setTimeout(() => {
                    welcomeScreen.style.opacity = '1';
                    welcomeScreen.style.transform = 'translateY(0)';
                }, 100); // short pause after input is gone

            }, 750); // fast transition to new screen
        }

        // Optional simple CSS animation for empty input feedback
        const styleSheet = document.createElement("style");
        styleSheet.type = "text/css";
        styleSheet.innerText = `
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                50% { transform: translateX(8px); }
                75% { transform: translateX(-4px); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
